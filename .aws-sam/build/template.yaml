AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Notes API using Lambda, API Gateway and DynamoDB
Globals:
  Function:
    Timeout: 10
    Runtime: python3.11
    Environment:
      Variables:
        TABLE_NAME: notes-table
Resources:
  NotesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: notes-api
      CodeUri: NotesFunction
      Handler: handler.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName: notes-table
      Events:
        CreateNote:
          Type: Api
          Properties:
            Path: /notes
            Method: POST
        GetNote:
          Type: Api
          Properties:
            Path: /notes
            Method: GET
        DeleteNote:
          Type: Api
          Properties:
            Path: /notes
            Method: DELETE
    Metadata:
      SamResourceId: NotesFunction
  NotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: notes-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
