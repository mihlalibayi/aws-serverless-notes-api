AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

# a short description of what this whole project is
Description: Serverless Notes API using Lambda, API Gateway and DynamoDB

# values I can reuse across this file so I dont hardcode things
Globals:
  Function:
    Timeout: 10                  # my Lambda will timeout after 10 seconds
    Runtime: python3.11          # I am using Python 3.11
    Environment:
      Variables:
        # I reference the table resource directly so there is one source of truth
        # if I rename the table, I only change it in one place
        TABLE_NAME: !Ref NotesTable

# all the AWS resources I want SAM to create for me
Resources:

  # my Lambda function
  NotesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: notes-api
      CodeUri: src/              # my code lives in the src/ folder
      Handler: handler.handler   # filename.functionname
      Policies:
        # this gives my Lambda permission to read and write to DynamoDB
        # scoped to only this specific table — principle of least privilege
        - DynamoDBCrudPolicy:
            TableName: !Ref NotesTable

      # these are the API Gateway routes that trigger my Lambda
      Events:
        CreateNote:
          Type: Api
          Properties:
            Path: /notes
            Method: POST

        GetNote:
          Type: Api
          Properties:
            Path: /notes
            Method: GET

        DeleteNote:
          Type: Api
          Properties:
            Path: /notes
            Method: DELETE

  # my DynamoDB table
  # part of the same stack as Lambda so the whole project deploys together
  NotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: notes-table
      BillingMode: PAY_PER_REQUEST   # I only pay for what I use, no fixed cost
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S           # S means String
      KeySchema:
        - AttributeName: id
          KeyType: HASH              # id is my primary key